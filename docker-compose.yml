# ── Production (always running) ──
# Ports: DB=5432, App=8000 (API + frontend)
#
# ── Development (run separately) ──
# Backend:  python -m uvicorn ix.api.main:app --reload --port 8001
# Frontend: cd ui && PORT=3001 INTERNAL_API_URL=http://127.0.0.1:8001 npm run dev
# Dev uses the SAME Postgres DB as prod (shared data)

services:
  db:
    image: postgres:17-alpine
    container_name: investment-x-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-investmentx}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: investment-x-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_URL=postgresql://postgres:postgres@db:5432/investmentx
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: investment-x-tunnel
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
