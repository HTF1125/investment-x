# ── Production (docker compose up) ──
# Frontend: localhost:3000 (Next.js server)
# Backend:  port 8000 (internal, no host mapping)
# Tunnel:   Cloudflare → localhost:3000 (shares frontend network)
#
# ── Development (dev start) ──
# Frontend: localhost:3000 (Next.js dev)
# Backend:  localhost:8000
# DB:       native Windows PostgreSQL on localhost:5432
#
# Frontend on 3000, backend on 8000 — same ports in dev and prod.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: investment-x-backend
    env_file:
      - .env
    environment:
      - DB_URL=postgresql://postgres:postgres@host.docker.internal:5432/investmentx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://backend:8000
    container_name: investment-x-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: investment-x-tunnel
    network_mode: "service:frontend"
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    env_file:
      - .env
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped

