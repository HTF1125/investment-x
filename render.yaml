databases:
  - name: investment-x-db
    plan: free
    databaseName: investmentx
    user: investmentx_user

services:
  # Combined Service (Backend + Frontend)
  - type: web
    name: investment-x-backend
    env: docker
    dockerfilePath: Dockerfile.combined
    rootDir: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: investment-x-db
          property: connectionString
      - key: PORT
        value: 8000
      - key: PYTHONUNBUFFERED
        value: 1
      - key: SECRET_KEY
        sync: false  # Set in Render dashboard — JWT signing secret
      - key: CORS_ORIGINS
        value: https://your-app.onrender.com  # Comma-separated allowed origins
      - key: GEMINI_API_KEY
        sync: false  # Set in Render dashboard
      - key: MINIMAX_API_KEY
        sync: false  # Set in Render dashboard
      - key: R2_ACCOUNT_ID
        sync: false  # Set in Render dashboard
      - key: R2_ACCESS_KEY_ID
        sync: false  # Set in Render dashboard
      - key: R2_SECRET_ACCESS_KEY
        sync: false  # Set in Render dashboard
      - key: R2_BUCKET_NAME
        sync: false  # Set in Render dashboard
